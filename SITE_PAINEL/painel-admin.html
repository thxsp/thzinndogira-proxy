<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | DONO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cores.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AREA DONO</h1>
            <p>ACESSO TOTAL - PODE CRIAR VITALICIO</p>
        </div>

        <div class="card">
            <h3>CRIAR NOVAS CHAVES</h3>
            
            <div class="campo">
                <label>VALIDADE:</label>
                <select id="validadeDono">
                    <option value="1">1 Dia</option>
                    <option value="7">7 Dias</option>
                    <option value="15">15 Dias</option>
                    <option value="30">30 Dias</option>
                    <option value="VITALICIO">VITALICIO (SO DONO)</option>
                </select>
            </div>

            <div class="campo">
                <label>QUANTIDADE:</label>
                <select id="qtdDono">
                    <option>1</option>
                    <option>5</option>
                    <option>10</option>
                    <option>20</option>
                </select>
            </div>

            <button class="btn" onclick="gerarChave('dono')">GERAR CHAVES</button>
        </div>

        <div class="card">
            <h3>CHAVES GERADAS</h3>
            <div id="resultadoDono" class="lista-keys"></div>
        </div>

        <button class="btn" onclick="window.location.href='index.html'">VOLTAR</button>
    </div>
</body>
</html>
